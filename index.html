<!DOCTYPE html>
<html>
<head>
<title>Brian Bot Ultimate</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon.png.jpeg" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
<style>

body {
margin: 0;
font-family: Arial, sans-serif;
background: #e5ddd5;
}

.dark-mode {
background: #121212;
color: white;
}

.chat-container {
display: flex;
flex-direction: column;
height: 100vh;
}

.header {
background: green;
color: white;
padding: 15px;
text-align: center;
font-size: 20px;
}

.chat-box {
flex: 1;
overflow-y: auto;
padding: 10px;
}

.message {
margin: 5px 0;
padding: 10px;
border-radius: 10px;
max-width: 75%;
}

.user {
background: #d1e7ff;
margin-left: auto;
}

.bot {
background: #d4edda;
}

.dark-mode .user {
background: #444;
}

.dark-mode .bot {
background: #333;
}

.input-area {
display: flex;
border-top: 1px solid #ccc;
}

input {
flex: 1;
padding: 15px;
border: none;
font-size: 16px;
}

button {
padding: 12px;
background: green;
color: white;
border: none;
font-size: 16px;
}

.controls {
display: flex;
gap: 5px;
padding: 5px;
}

</style>

</head>

<body>

<div class="chat-container">

<div class="header">
🤖 Brian Bot Ultimate
</div>

<div id="chatBox" class="chat-box"></div>

<div class="controls">

<button onclick="toggleDarkMode()">🌙 Dark</button>

<button onclick="startVoice()">🎤 Speak</button>

<button onclick="clearChat()">🗑 Clear</button>
<button on =click="savechat()">save</button>
</div>

<div class="input-area">

<input 
type="text"
id="userInput"
placeholder="Type or speak..."
onkeypress="handleKey(event)"
>

<button onclick="sendMessage()">Send</button>

</div>

</div>

<script>

// Load saved data
let userName = localStorage.getItem("brianUserName") || "";
let savedChat = localStorage.getItem("brianChat");

if(savedChat) {
document.getElementById("chatBox").innerHTML = savedChat;
}

// Voice Output
function speak(text) {

let speech = new SpeechSynthesisUtterance(text);

speech.lang = "en-US";

window.speechSynthesis.speak(speech);

}

// Voice Input
function startVoice() {

let recognition = new webkitSpeechRecognition();

recognition.lang = "en-US";

recognition.onresult = function(event) {

let voiceText = event.results[0][0].transcript;

document.getElementById("userInput").value = voiceText;

sendMessage();

};

recognition.start();

}

// Dark Mode
function toggleDarkMode() {

document.body.classList.toggle("dark-mode");

}

// Clear Chat
function clearChat() {

document.getElementById("chatBox").innerHTML = "";

localStorage.removeItem("brianChat");

}

// Enter key
function handleKey(event) {

if (event.key === "Enter") {

sendMessage();

}

}

// Add Message
function addMessage(text, sender) {

let chatBox = document.getElementById("chatBox");

let msg = document.createElement("div");

msg.classList.add("message");

msg.classList.add(sender);

msg.innerText = text;

chatBox.appendChild(msg);

chatBox.scrollTop = chatBox.scrollHeight;

// Save chat
localStorage.setItem("brianChat", chatBox.innerHTML);

}

// Send Message
function sendMessage() {

let input = document.getElementById("userInput");

let message = input.value.trim().toLowerCase();

if(message === "") return;

addMessage(message, "user");

let response = getBotResponse(message);

setTimeout(() => {

addMessage(response, "bot");

speak(response);

}, 500);

input.value = "";

}

// =====================
// BOT RESPONSE SYSTEM
// =====================

function getBotResponse(message) {

// Save Name
if(userName === "") {

if(message.includes("my name is")) {

userName = message.replace("my name is","").trim();

} else {

userName = message;

}

localStorage.setItem("brianUserName", userName);

return "Nice to meet you my name is Brian Bot " + userName ;

}

// Greetings
if(message.includes("hello") || message.includes("hi")) {

return "Hello " + userName + " how can i help you";

}

// Ask Name
if(message.includes("what is my name")) {

return "Your name is " + userName;

}

// Who are you
if(message.includes("who are you")) {

return "I am Brian Bot Ultimate, your assistant.";

}
// who created you
if(message.includes("who created you")) {
    return "I was created by Brian jayden he is my best friend and my partner"
}

// Time
if(message.includes("time")) {

return "Current time is " + new Date().toLocaleTimeString();

}

// Date
if(message.includes("date")) {

return "Today's date is " + new Date().toLocaleDateString();

}

// Joke
if(message.includes("joke")) {

return "Why did the computer get tired? Because it had too many tabs open! 😂";

}
// =====================
// MORE REALISTIC JOKES
// =====================

if(
message.includes("joke") ||
message.includes("make me laugh") ||
message.includes("funny")
) {

let jokes = [

"Why did the math book look sad? Because it had too many problems.",

"I told my computer I needed a break… now it won't stop sending me KitKat ads.",

"Why don’t programmers like nature? Too many bugs.",

"I tried to catch fog yesterday… Mist!",

"Why did the student eat his homework? Because the teacher said it was a piece of cake.",

"What do you call fake spaghetti? An impasta.",

"Why did the computer go to the doctor? It caught a virus.",

"Why was the equal sign humble? Because it wasn’t less than or greater than anyone."

];

let randomJoke = jokes[Math.floor(Math.random() * jokes.length)];

return randomJoke;

}


// =====================
// STORY TELLING
// =====================

if(
message.includes("tell me a story") ||
message.includes("story")
) {

let stories = [

"Once upon a time, a young programmer built a smart assistant called Brian Bot. It helped students solve problems and became famous.",

"A student found an old computer that could talk. He used it to learn coding and became a great developer.",

"In a small town, a boy practiced coding daily. One day he built an app that helped thousands of people."

];

let randomStory = stories[Math.floor(Math.random() * stories.length)];

return randomStory;

}


// =====================
// FUN FACTS
// =====================

if(
message.includes("fun fact") ||
message.includes("fact")
) {

let facts = [

"Did you know? The first computer weighed over 27 tons.",

"Fun fact: The first website is still online today.",

"Did you know? Honey never spoils.",

"Fun fact: Octopuses have three hearts.",

"Did you know? The Internet started in 1969."

];

let randomFact = facts[Math.floor(Math.random() * facts.length)];

return randomFact;

}


// =====================
// MOTIVATION
// =====================

if(
message.includes("motivate me") ||
message.includes("motivation") ||
message.includes("quote")
) {

let quotes = [

"Believe in yourself — you can do amazing things.",

"Success comes from practice every day.",

"Don't give up — every expert started as a beginner.",

"You are stronger than you think.",

"Every day is a new opportunity."

];

let randomQuote = quotes[Math.floor(Math.random() * quotes.length)];

return randomQuote;

}


// =====================
// RIDDLES
// =====================

if(
message.includes("riddle")
) {

let riddles = [

"What has keys but can't open locks? (Answer: Piano)",

"What gets wetter the more it dries? (Answer: Towel)",

"What has hands but cannot clap? (Answer: Clock)",

"I speak without a mouth. What am I? (Answer: Echo)"

];

let randomRiddle = riddles[Math.floor(Math.random() * riddles.length)];

return randomRiddle;

}


// =====================
// MINI GAME — GUESS NUMBER
// =====================

if(message.includes("play game")) {

let number = Math.floor(Math.random() * 10) + 1;

localStorage.setItem("gameNumber", number);

return "🎮 I'm thinking of a number between 1 and 10. Guess it!";

}

let gameNumber = localStorage.getItem("gameNumber");

if(gameNumber && !isNaN(message)) {

if(Number(message) === Number(gameNumber)) {

localStorage.removeItem("gameNumber");

return "🎉 Correct! You guessed the number!";

}

else {

return "❌ Wrong guess. Try again!";

}

}

// =====================
// FULL MATH SYSTEM
// =====================

// Percentage
if(message.includes("percent")) {

try {

let numbers = message.match(/\d+/g);

let percent = numbers[0];

let total = numbers[1];

let result = (percent / 100) * total;

return percent + "% of " + total + " is " + result;

} catch {}

}

// Circle Area
if(message.includes("area of circle")) {

try {

let radius = parseFloat(message.match(/\d+/)[0]);

let area = Math.PI * radius * radius;

return "Area of circle is " + area.toFixed(2);

} catch {}

}

// Rectangle Area
if(message.includes("area of rectangle")) {

try {

let nums = message.match(/\d+/g);

let length = nums[0];

let width = nums[1];

let area = length * width;

return "Area of rectangle is " + area;

} catch {}

}

// Triangle Area
if(message.includes("area of triangle")) {

try {

let nums = message.match(/\d+/g);

let base = nums[0];

let height = nums[1];

let area = 0.5 * base * height;

return "Area of triangle is " + area;

} catch {}

}

// Quadratic Solver
if(message.includes("solve quadratic")) {

try {

let nums = message.match(/-?\d+/g);

let a = parseFloat(nums[0]);

let b = parseFloat(nums[1]);

let c = parseFloat(nums[2]);

let d = (b*b)-(4*a*c);

if(d < 0) {

return "No real solutions.";

}

let x1 = (-b + Math.sqrt(d))/(2*a);

let x2 = (-b - Math.sqrt(d))/(2*a);

return "Solutions are " + x1 + " and " + x2;

} catch {}

}

// General Calculator
if(
message.includes("+") ||
message.includes("-") ||
message.includes("*") ||
message.includes("/") ||
message.includes("^") ||
message.includes("sqrt") ||
message.includes("what is")
){

try {

let mathExp = message
.replace("what is","")
.replace("x","*")
.replace("×","*")
.replace("÷","/")
.replace("^","**")
.replace("sqrt","Math.sqrt")
.trim();

let result = eval(mathExp);

if(result !== undefined) {

return "The answer is " + result;

}

} catch {}

}

// Help
if(message.includes("help")) {

return "You can ask math, time, date, jokes, or speak using the microphone.";

}

// Default
return "I'm still learning. Try asking math or say help.";

}

</script>

</body>
</html>
